name: Envoix
options:
  bundleIdPrefix: com.envoix
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  EnvoixCore:
    path: ../../crates/envoix-ffi/EnvoixCore

targets:
  Envoix:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: EnvoixCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.envoix.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        INFOPLIST_KEY_CFBundleDisplayName: Envoix
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Envoix connects to nearby devices on your local network to transfer files."
        # The Rust static library (iroh / objc2) references these system
        # frameworks. CoreWLAN is looked up dynamically at runtime, so it must
        # be linked or the app panics during network setup.
        OTHER_LDFLAGS:
          - "-framework"
          - "SystemConfiguration"
          - "-framework"
          - "Security"
          - "-framework"
          - "SecurityFoundation"
          - "-framework"
          - "CoreWLAN"
