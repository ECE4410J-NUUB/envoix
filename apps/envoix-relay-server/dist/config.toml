# Envoix relay configuration.
#
# The master key is NOT stored here. It is generated on first run at
# `key_file` with 0600 permissions, or set explicitly via the
# ENVOIX_RELAY_KEY environment variable for a public relay that must share a
# key with the rendezvous server.

# UDP listen address. "0.0.0.0:9104" serves IPv4 only; use "[::]:9104" to
# serve BOTH IPv4 and IPv6 (Linux dual-stack), or for an IPv6-only host. If a
# dual-stack host warns on IPv6 reachability, switch this to "[::]:9104".
listen = "0.0.0.0:9104"

# Optional inclusive UDP port range to bind, e.g. "9100-9105", so a client can
# try several ports when one is throttled/blocked (e.g. by a censoring
# firewall). The `listen` port must be inside the range, and the whole range
# must be opened in the firewall. The rendezvous must advertise the same range
# (ENVOIX_RELAY_ADVERTISE_PORTS). Unset = single port. Max 64 ports.
# port_range = "9100-9105"

key_file = "/var/lib/envoix-relay/relay.key"
usage_file = "/var/lib/envoix-relay/usage.json"
stats_file = "/var/lib/envoix-relay/stats.json"

# 200 GiB / month; forwarding pauses on exceed, resets at month start (UTC).
monthly_byte_limit = 214748364800
# ~1.2 GiB per session (allows a ~1 GB file).
max_bytes_per_session = 1288490188
max_sessions = 64
idle_timeout_secs = 60
sweep_interval_secs = 30
housekeeping_interval_secs = 30

# Public rendezvous base URL. When set, `envoix-relay-server test` also asks
# the rendezvous to send a probe packet back to this relay, confirming the
# port is reachable from the internet (NAT/firewall/security-group). Leave
# unset to keep `test` local-only and offline.
# rendezvous_url = "https://rdz.example.com/rdv"

# Address family for the reachability probe: auto | ipv4 | ipv6.
#   auto -> probe BOTH families, one result line each (skips a family this
#           host has no connectivity for).
#   ipv4 / ipv6 -> force a single family.
probe_family = "auto"
