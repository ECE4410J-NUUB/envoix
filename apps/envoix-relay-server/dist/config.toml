# Envoix relay configuration.
#
# The master key is NOT stored here. It is generated on first run at
# `key_file` with 0600 permissions, or set explicitly via the
# ENVOIX_RELAY_KEY environment variable for a public relay that must share a
# key with the rendezvous server.

listen = "0.0.0.0:9104"
key_file = "/var/lib/envoix-relay/relay.key"
usage_file = "/var/lib/envoix-relay/usage.json"
stats_file = "/var/lib/envoix-relay/stats.json"

# 200 GiB / month; forwarding pauses on exceed, resets at month start (UTC).
monthly_byte_limit = 214748364800
# ~1.2 GiB per session (allows a ~1 GB file).
max_bytes_per_session = 1288490188
max_sessions = 64
idle_timeout_secs = 60
sweep_interval_secs = 30
housekeeping_interval_secs = 30
