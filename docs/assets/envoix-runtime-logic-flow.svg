<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 820" role="img" aria-label="Runtime logic flow block diagram for secure P2P file transfer app">
    <style><![CDATA[
  .box { fill:#fff; stroke:#334155; stroke-width:1.6; rx:14; }
  .box-blue { fill:#eff6ff; stroke:#2563eb; }
  .box-green { fill:#ecfdf5; stroke:#059669; }
  .box-orange { fill:#fff7ed; stroke:#ea580c; }
  .box-red { fill:#fef2f2; stroke:#dc2626; }
  .box-purple { fill:#f5f3ff; stroke:#7c3aed; }
  .box-slate { fill:#f8fafc; stroke:#475569; }
  .box-yellow { fill:#fefce8; stroke:#ca8a04; }
  .label { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#0f172a; }
  .small { font: 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#334155; }
  .tiny { font: 11px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#475569; }
  .flow { fill:none; stroke:#334155; stroke-width:2.1; marker-end:url(#arrow); }
  .control { fill:none; stroke:#7c3aed; stroke-width:2; stroke-dasharray:7 5; marker-end:url(#arrowPurple); }
  .fail { fill:none; stroke:#dc2626; stroke-width:2; stroke-dasharray:6 5; marker-end:url(#arrowRed); }
  .relay { fill:none; stroke:#7c3aed; stroke-width:2.4; marker-end:url(#arrowPurple); }
  .data { fill:none; stroke:#2563eb; stroke-width:2.4; stroke-dasharray:8 6; marker-end:url(#arrowBlue); }
  .dep { fill:none; stroke:#64748b; stroke-width:1.8; marker-end:url(#arrowDep); }
  .dep-main { fill:none; stroke:#7c3aed; stroke-width:2.2; marker-end:url(#arrowPurple); }
  .legend-text { font: 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#334155; }
]]></style>
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker>
      <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker>
    </defs>

    <rect x="28" y="28" width="1344" height="760" rx="24" fill="#ffffff" stroke="#cbd5e1" />

    <rect x="70" y="145" width="300" height="510" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" />
    <text x="100" y="182" class="label">Peer A Client</text>
    <rect x="105" y="215" width="230" height="52" class="box box-blue" />
    <text x="220" y="238" text-anchor="middle" class="label">Desktop CLI</text>
    <text x="220" y="255" text-anchor="middle" class="small">Rust frontend</text>
    <rect x="105" y="285" width="230" height="52" class="box box-blue" />
    <text x="220" y="308" text-anchor="middle" class="label">Android UI</text>
    <text x="220" y="325" text-anchor="middle" class="small">Native + UniFFI binding</text>
    <rect x="105" y="355" width="230" height="52" class="box box-blue" />
    <text x="220" y="378" text-anchor="middle" class="label">Swift UI</text>
    <text x="220" y="395" text-anchor="middle" class="small">Native + UniFFI binding</text>
    <rect x="90" y="455" width="260" height="170" class="box box-green" />
    <text x="220" y="487" text-anchor="middle" class="label">Rust Client Core</text>
    <text x="220" y="512" text-anchor="middle" class="small">session orchestrator</text>
    <text x="220" y="533" text-anchor="middle" class="small">auth + discovery + transfer</text>
    <text x="220" y="554" text-anchor="middle" class="small">transport abstraction</text>
    <rect x="125" y="580" width="190" height="30" rx="10" fill="#dbeafe" stroke="#2563eb" />
    <text x="220" y="600" text-anchor="middle" class="small" font-weight="700">QUIC transport</text>

    <rect x="1030" y="145" width="300" height="510" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" />
    <text x="1060" y="182" class="label">Peer B Client</text>
    <rect x="1065" y="215" width="230" height="52" class="box box-blue" />
    <text x="1180" y="238" text-anchor="middle" class="label">Desktop CLI</text>
    <text x="1180" y="255" text-anchor="middle" class="small">Rust frontend</text>
    <rect x="1065" y="285" width="230" height="52" class="box box-blue" />
    <text x="1180" y="308" text-anchor="middle" class="label">Android UI</text>
    <text x="1180" y="325" text-anchor="middle" class="small">Native + UniFFI binding</text>
    <rect x="1065" y="355" width="230" height="52" class="box box-blue" />
    <text x="1180" y="378" text-anchor="middle" class="label">Swift UI</text>
    <text x="1180" y="395" text-anchor="middle" class="small">Native + UniFFI binding</text>
    <rect x="1050" y="455" width="260" height="170" class="box box-green" />
    <text x="1180" y="487" text-anchor="middle" class="label">Rust Client Core</text>
    <text x="1180" y="512" text-anchor="middle" class="small">same shared core</text>
    <text x="1180" y="533" text-anchor="middle" class="small">session orchestrator</text>
    <text x="1180" y="554" text-anchor="middle" class="small">transport abstraction</text>
    <rect x="1085" y="580" width="190" height="30" rx="10" fill="#dbeafe" stroke="#2563eb" />
    <text x="1180" y="600" text-anchor="middle" class="small" font-weight="700">QUIC transport</text>

    <rect x="495" y="145" width="410" height="90" class="box box-purple" />
    <text x="700" y="178" text-anchor="middle" class="label">Rendezvous Server</text>
    <text x="700" y="202" text-anchor="middle" class="small">VPS pairing service</text>
    <text x="700" y="220" text-anchor="middle" class="small">exchanges peer metadata only; does not relay traffic</text>

    <rect x="495" y="285" width="410" height="325" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" />
    <text x="700" y="322" text-anchor="middle" class="label">Fallback Strategy</text>
    <text x="700" y="345" text-anchor="middle" class="small">Try each QUIC path in priority order until one succeeds.</text>
    <rect x="540" y="372" width="320" height="48" class="box box-green" />
    <text x="700" y="402" text-anchor="middle" class="label">1. LAN</text>
    <path d="M700 420 L700 448" class="fail" />
    <text x="720" y="440" class="tiny">if unavailable</text>
    <rect x="540" y="448" width="320" height="48" class="box box-green" />
    <text x="700" y="478" text-anchor="middle" class="label">2. IPv6 direct</text>
    <path d="M700 496 L700 524" class="fail" />
    <text x="720" y="516" class="tiny">if blocked</text>
    <rect x="540" y="524" width="320" height="48" class="box box-yellow" />
    <text x="700" y="554" text-anchor="middle" class="label">3. Hole punching over QUIC</text>

    <rect x="525" y="660" width="350" height="66" class="box box-red" />
    <text x="700" y="688" text-anchor="middle" class="label">Relay Server</text>
    <text x="700" y="710" text-anchor="middle" class="small">final fallback when direct paths fail</text>

    <path d="M220 407 L220 453" class="control" />
    <path d="M1180 407 L1180 453" class="control" />
    <path d="M350 500 C430 380 430 245 495 195" class="control" />
    <path d="M1050 500 C970 380 970 245 905 195" class="control" />
    <path d="M350 545 C430 520 450 382 495 382" class="control" />
    <path d="M1050 545 C970 520 950 382 905 382" class="control" />

    <path d="M700 572 L700 660" class="fail" />
    <text x="720" y="630" class="tiny">if NAT traversal fails</text>
    <path d="M350 560 C430 545 455 530 495 505" class="data" />
    <path d="M905 505 C945 530 970 545 1050 560" class="data" />
    <path d="M350 610 C430 640 455 675 525 693" class="data" />
    <path d="M875 693 C945 675 970 640 1050 610" class="data" />

    <rect x="980" y="705" width="350" height="66" rx="14" fill="#ffffff" stroke="#cbd5e1" />
    <line x1="1002" y1="730" x2="1052" y2="730" class="control" />
    <text x="1067" y="734" class="legend-text">control / coordination</text>
    <line x1="1002" y1="755" x2="1052" y2="755" class="fail" />
    <text x="1067" y="759" class="legend-text">fallback after failed attempt</text>
    <line x1="1220" y1="755" x2="1270" y2="755" class="data" />
    <text x="1282" y="759" class="legend-text">data</text>
  </svg>
